spring:

  profiles:
    active: prod

  datasource:
    url: jdbc:postgresql://postgres:5432/purchase
    username: user
    password: password

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

  rabbitmq:
    host: rabbitmq
    port: 5672
    username: guest
    password: guest

management:
  endpoints:
    web:
      exposure:
        include: health,info

server:
  forward-headers-strategy: framework
